[project]
name = "pyblu"
version = "1.0.2"
description = ""
authors = [{ name = "Louis Christ", email = "mail@louischrist.de" }]
repository = "https://github.com/LouisChrist/pyblu"
readme = "README.md"
packages = [
    { include = "pyblu", from = "src" },
]
dependencies = [
    "aiohttp == 3.10.5",
    "lxml == 5.3.0"]

[tool.uv]
dev-dependencies = [
    "pylint == 3.2.6",
    "black == 24.8.0",
    "pytest == 8.3.2",
    "aioresponses == 0.7.6",
    "pytest-asyncio == 0.24.0",
    "sphinx == 8.0.2",
    "invoke == 2.2.0",
    "semver == 3.0.2",
    "mypy == 1.11.2",
    "pygithub == 2.4.0",
    "types-lxml == 2024.8.7",]

[tool.pylint."messages control"]
disable = [
    "missing-function-docstring",
    "missing-module-docstring",
    "missing-class-docstring",
    "too-many-instance-attributes",
    "too-many-public-methods",
    "duplicate-code",
]

[tool.pylint.format]
max-line-length = 160

[tool.black]
line-length = 160

[tool.pytest.ini_options]
pythonpath = "src"
asyncio_mode = "auto"
